<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* Essential styles to make the effect fullscreen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        #lights-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: white;
            text-align: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .redirect-box {
            background: rgba(255, 255, 255, 0.05);
            /* backdrop-filter: blur(10px); */
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        a { color: #03b3c3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lights-container"></div>

    <div class="overlay">
        <div class="redirect-box">
            <h1>Are you readyyyyy</h1>
            <p>Redirecting to <a href="landing/index.html">landing page</a>...</p>
        </div>
    </div>

    <!-- We use Three.js as the engine for the Hyperspeed effect -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Automatic redirect after 3 seconds to show off the effect
        setTimeout(() => {
            window.location.href = "landing/index.html";
        }, 3500);

        /**
         * Hyperspeed Effect Logic
         * Manually coded implementation of your ReactBits configuration
         */
        const options = {
            onSpeedUp: () => { console.log("Accelerating..."); },
            onSlowDown: () => { },
            distortion: 'turbulentDistortion',
            length: 400,
            roadWidth: 10,
            islandWidth: 2,
            lanesPerRoad: 3,
            fov: 90,
            colors: {
                roadColor: 0x080808,
                islandColor: 0x0a0a0a,
                background: 0x000000,
                shoulderLines: 0x131318,
                brokenLines: 0x131318,
                leftCars: [0xd856bf, 0x6750a2, 0xc247ac],
                rightCars: [0x03b3c3, 0x0e5ea5, 0x324555],
                sticks: 0x03b3c3
            }
        };

        // Initialize Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(options.fov, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('lights-container').appendChild(renderer.domElement);

        // Simple representation of the moving lights (The "Manual" core)
        const geometry = new THREE.BoxGeometry(0.1, 0.1, 2);
        const lights = [];

        function createLight(color, x, z) {
            const material = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, -1, z);
            scene.add(mesh);
            return mesh;
        }

        // Generate initial light trails based on your colors
        for(let i = 0; i < 100; i++) {
            const isLeft = Math.random() > 0.5;
            const colorSet = isLeft ? options.colors.leftCars : options.colors.rightCars;
            const color = colorSet[Math.floor(Math.random() * colorSet.length)];
            const x = isLeft ? -Math.random() * 5 - 2 : Math.random() * 5 + 2;
            const z = -Math.random() * options.length;
            lights.push({ mesh: createLight(color, x, z), speed: Math.random() * 2 + 1 });
        }

        camera.position.z = 5;
        camera.position.y = 1;

        function animate() {
            requestAnimationFrame(animate);
            
            lights.forEach(light => {
                light.mesh.position.z += light.speed;
                if (light.mesh.position.z > 5) {
                    light.mesh.position.z = -options.length;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
